name: Build emb3r

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: win-x64
            install: npm ci
            args: --win --x64

          - os: macos-latest
            name: mac-arm64
            install: npm ci
            args: --mac --arm64

          # macos-latest is Apple Silicon, and node-llama-cpp ships its binaries
          # as per-arch optional dependencies, so a plain install here would put
          # arm64 binaries inside an x64 app. --os/--cpu forces npm to fetch the
          # Intel ones instead. electron-builder downloads the matching Electron
          # for the target arch by itself.
          - os: macos-latest
            name: mac-x64
            install: npm ci --os=darwin --cpu=x64
            args: --mac --x64

    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Build application
        env:
          # No Apple Developer cert in CI, so don't let electron-builder
          # try (and fail) to auto-discover a signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # electron-builder skips signing on pull requests by default, to keep
          # certificates away from fork builds. We only ever ad-hoc sign, so
          # there is no secret to protect - and without this every PR artifact
          # is unsigned, which Apple Silicon refuses to launch at all.
          CSC_FOR_PULL_REQUEST: true
        # --publish never: on a tag build electron-builder would otherwise try
        # to publish to GitHub itself, from a job with a read-only token (403).
        # Building and publishing are deliberately separate here - the release
        # job below does the publishing.
        run: npm run dist -- ${{ matrix.args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: emb3r-${{ matrix.name }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "emb3r $GITHUB_REF_NAME" \
            --notes-file .github/RELEASE_NOTES.md \
            artifacts/*/*
