name: Build emb3r

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: win-x64
            install: npm ci
            args: --win --x64

          # electron-builder names the auto-update feed file the same
          # ("latest-mac.yml") on every mac build regardless of architecture -
          # confirmed by reading app-builder-lib's own update-info generator,
          # which only adds an arch suffix on Linux. Building arm64 and x64 as
          # two separate jobs (needed below, for the native-binary reason) means
          # each would independently produce a file with that same name, which
          # collide when both land in the same GitHub release. Publishing this
          # job under its own "arm64" channel makes electron-builder write
          # "arm64-mac.yml" instead, and main.js asks for that same channel at
          # runtime on arm64 Macs - see the comment above autoUpdater.channel.
          - os: macos-latest
            name: mac-arm64
            install: npm ci
            args: --mac --arm64 -c.publish.channel=arm64

          # macos-latest is Apple Silicon, and node-llama-cpp ships its binaries
          # as per-arch optional dependencies, so a plain install here would put
          # arm64 binaries inside an x64 app. --os/--cpu forces npm to fetch the
          # Intel ones instead. electron-builder downloads the matching Electron
          # for the target arch by itself.
          - os: macos-latest
            name: mac-x64
            install: npm ci --os=darwin --cpu=x64
            args: --mac --x64

    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Build application
        env:
          # No Apple Developer cert in CI, so don't let electron-builder
          # try (and fail) to auto-discover a signing identity.
          # No Developer ID cert here, so electron-builder does no signing of
          # its own. scripts/after-pack.cjs applies an ad-hoc signature instead,
          # on every build including pull requests - Apple Silicon will not
          # launch an unsigned arm64 app at all.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        # --publish never: on a tag build electron-builder would otherwise try
        # to publish to GitHub itself, from a job with a read-only token (403).
        # Building and publishing are deliberately separate here - the release
        # job below does the publishing.
        run: npm run dist -- ${{ matrix.args }} --publish never

      # electron-builder always writes dist/builder-debug.yml alongside the
      # real update feed file (latest.yml / latest-mac.yml / arm64-mac.yml) -
      # it's an internal glob-pattern dump, not update metadata, and must not
      # be uploaded as if it were. shell: bash so `rm` works the same way on
      # the Windows job too, which otherwise defaults to PowerShell.
      - name: Remove electron-builder debug output
        shell: bash
        run: rm -f dist/builder-debug.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: emb3r-${{ matrix.name }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "emb3r $GITHUB_REF_NAME" \
            --notes-file .github/RELEASE_NOTES.md \
            artifacts/*/*
